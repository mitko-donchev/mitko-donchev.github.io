name: Deploy to GitHub Pages
on:
  push:
    branches:
      - main
permissions:
  contents: write
jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment: github-pages
    steps:
      - name: Checkout 🛎️
        uses: actions/checkout@v4

      - name: Setup Node.js ⚙️
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Pin npm 📌
        run: npm install -g npm@11

      - name: Install 📦
        timeout-minutes: 3
        run: npm ci --no-audit --no-fund

      - name: Upload npm debug log 🐞
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: npm-debug-log
          path: ~/.npm/_logs/

      - name: Build 🔧
        run: npm run build
        env:
          CI: "false"
          NODE_OPTIONS: "--max-old-space-size=4096"
          REACT_APP_SERVICE_ID: ${{ secrets.REACT_APP_SERVICE_ID }}
          REACT_APP_TEMPLATE_ID: ${{ secrets.REACT_APP_TEMPLATE_ID }}
          REACT_APP_USER_ID: ${{ secrets.REACT_APP_USER_ID }}
          REACT_APP_RECAPTCHA_KEY: ${{ secrets.REACT_APP_RECAPTCHA_KEY }}

      - name: Deploy 🚀
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: gh-pages
          folder: build
